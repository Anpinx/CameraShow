app:
  name: CameraDemo
  host: 127.0.0.1
  port: 8000
  debug: false

logging:
  level: INFO
  dir: logs
  filename: camera_demo.log
  max_bytes: 10485760
  backup_count: 5

cors:
  allow_origins:
    - "*"
  allow_credentials: true

paths:
  captures: data/captures
  records: data/records
  temp: data/temp

settings:
  # Leave empty to use ~/Pictures/Camera_Captures and ~/Pictures/Camera_Records
  default_save_path: ""
  default_record_save_path: ""
  max_captures: 10
  max_records: 10
